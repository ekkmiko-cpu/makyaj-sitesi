name: Fiyat Güncelle — Sephora TR

on:
  schedule:
    - cron: '0 3 * * 1'   # Her Pazartesi gece 03:00 UTC (sabah 06:00 TR)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Google Chrome kur
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome-stable --version

      - name: Scraper bağımlılıklarını yükle
        working-directory: scraper
        run: npm ci

      - name: Playwright Chrome driver kur
        working-directory: scraper
        run: npx playwright install chrome --with-deps

      - name: Sephora TR scrape et
        working-directory: scraper
        run: node sephora-scraper.js
        timeout-minutes: 20

      - name: Scraper sonucu kontrol et
        run: |
          if [ -f scraper/sephora-products.json ]; then
            COUNT=$(node -e "console.log(require('./scraper/sephora-products.json').length)")
            echo "Bulunan ürün: $COUNT"
            if [ "$COUNT" -lt "10" ]; then
              echo "HATA: Çok az ürün ($COUNT)."
              exit 1
            fi
          else
            echo "HATA: sephora-products.json oluşturulamadı!"
            exit 1
          fi

      - name: products-data.js oluştur
        working-directory: scraper
        run: node generate-site-data.js

      - name: Değişiklik var mı kontrol et
        id: check
        run: |
          if git diff --quiet products-data.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit ve push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TARIH=$(date +'%d.%m.%Y')
          URUN=$(node -e "console.log(require('./scraper/sephora-products.json').length)")
          git add products-data.js scraper/sephora-products.json
          git commit -m "Fiyat guncellemesi — $TARIH ($URUN urun)"
          git push

      - name: Değişiklik yoksa bildir
        if: steps.check.outputs.changed == 'false'
        run: echo "Fiyat değişikliği yok, commit atlanıyor."
