name: Fiyat Güncelle — Sephora TR

on:
  schedule:
    - cron: '0 3 * * 1'   # Her Pazartesi gece 03:00 UTC (sabah 06:00 TR)
  workflow_dispatch:        # Elle de tetiklenebilir

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Xvfb kur (sanal ekran)
        run: sudo apt-get install -y xvfb

      - name: Scraper bağımlılıklarını yükle
        working-directory: scraper
        run: npm install

      - name: Playwright tarayıcısını yükle
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Sephora TR scrape et
        working-directory: scraper
        run: xvfb-run --auto-servernum node sephora-scraper.js
        timeout-minutes: 20

      - name: Scraper sonucu kontrol et
        run: |
          if [ -f scraper/sephora-products.json ]; then
            COUNT=$(node -e "console.log(require('./scraper/sephora-products.json').length)")
            echo "Bulunan ürün: $COUNT"
            if [ "$COUNT" -lt "10" ]; then
              echo "HATA: Çok az ürün ($COUNT). Sephora engelliyor olabilir."
              exit 1
            fi
          else
            echo "HATA: sephora-products.json oluşturulamadı!"
            exit 1
          fi

      - name: products-data.js oluştur
        working-directory: scraper
        run: node generate-site-data.js

      - name: Değişiklik var mı kontrol et
        id: check
        run: |
          if git diff --quiet products-data.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Fiyatlarda değişiklik yok."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Değişiklik tespit edildi!"
          fi

      - name: Commit ve push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TARIH=$(date +'%d.%m.%Y')
          URUN=$(node -e "console.log(require('./scraper/sephora-products.json').length)")
          git add products-data.js scraper/sephora-products.json
          git commit -m "Fiyat guncellemesi — $TARIH ($URUN urun)"
          git push

      - name: Değişiklik yoksa bildir
        if: steps.check.outputs.changed == 'false'
        run: echo "Fiyat değişikliği yok, commit atlanıyor."
